<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Meat - Online Ordering</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        header p {
            color: #666;
            font-size: 1.1em;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .product-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }
        .product-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
        }
        .product-info {
            padding: 20px;
        }
        .product-name {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 10px;
        }
        .product-description {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 15px;
            min-height: 40px;
        }
        .product-price {
            font-size: 1.8em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .product-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .quantity-btn {
            background: #f0f0f0;
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 1.2em;
        }
        .quantity-btn:hover {
            background: #e0e0e0;
        }
        .quantity-input {
            width: 50px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 5px;
        }
        .add-to-cart {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .add-to-cart:hover {
            opacity: 0.9;
        }
        .cart-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .cart-section h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .cart-empty {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-name {
            font-weight: bold;
            color: #333;
        }
        .cart-item-price {
            color: #667eea;
            font-weight: bold;
        }
        .cart-total {
            text-align: right;
            padding: 20px 15px;
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            border-top: 2px solid #667eea;
        }
        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.3s;
        }
        .checkout-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐟 Sea Meat - Fresh Seafood</h1>
            <p>Premium quality fresh sea meat delivered to your door</p>
        </header>

        <div class="products-grid" id="productsGrid">
            <!-- Products will be generated here -->
        </div>

        <div class="cart-section">
            <h2>🛒 Shopping Cart</h2>
            <div id="cartItems" class="cart-empty">Your cart is empty</div>
            <div id="cartTotal" class="cart-total" style="display: none;"></div>
            <button class="checkout-btn" onclick="checkout()" style="display: none;" id="checkoutBtn">Proceed to Checkout</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: 'Fresh Salmon', emoji: '🐟', description: 'Premium Atlantic salmon fillet', price: 24.99 },
            { id: 2, name: 'Wild Tuna', emoji: '🐠', description: 'Fresh caught wild tuna steak', price: 32.99 },
            { id: 3, name: 'Shrimp', emoji: '🦐', description: 'Large jumbo shrimp, peeled and deveined', price: 18.99 },
            { id: 4, name: 'Sea Bass', emoji: '🐟', description: 'Whole fresh sea bass, cleaned', price: 28.99 },
            { id: 5, name: 'Crab Legs', emoji: '🦀', description: 'Alaskan king crab legs', price: 42.99 },
            { id: 6, name: 'Oysters', emoji: '🦪', description: 'Fresh Pacific oysters, dozen', price: 22.99 },
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image">${product.emoji}</div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-description">${product.description}</div>
                        <div class="product-price">$${product.price.toFixed(2)}</div>
                        <div class="product-quantity">
                            <button class="quantity-btn" onclick="decreaseQty(${product.id})">−</button>
                            <input type="number" id="qty-${product.id}" class="quantity-input" value="1" min="1">
                            <button class="quantity-btn" onclick="increaseQty(${product.id})">+</button>
                        </div>
                        <button class="add-to-cart" onclick="addToCart(${product.id})">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const quantity = parseInt(document.getElementById(`qty-${productId}`).value);
            
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                cart.push({ ...product, quantity });
            }
            
            document.getElementById(`qty-${productId}`).value = 1;
            updateCart();
        }

        function increaseQty(productId) {
            const input = document.getElementById(`qty-${productId}`);
            input.value = parseInt(input.value) + 1;
        }

        function decreaseQty(productId) {
            const input = document.getElementById(`qty-${productId}`);
            if (parseInt(input.value) > 1) {
                input.value = parseInt(input.value) - 1;
            }
        }

        function updateCart() {
            const cartItemsDiv = document.getElementById('cartItems');
            const cartTotalDiv = document.getElementById('cartTotal');
            const checkoutBtn = document.getElementById('checkoutBtn');

            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<div class="cart-empty">Your cart is empty</div>';
                cartTotalDiv.style.display = 'none';
                checkoutBtn.style.display = 'none';
                return;
            }

            let total = 0;
            cartItemsDiv.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name} × ${item.quantity}</div>
                            <div class="cart-item-price">$${itemTotal.toFixed(2)}</div>
                        </div>
                        <button class="quantity-btn" onclick="removeFromCart(${item.id})">Remove</button>
                    </div>
                `;
            }).join('');

            cartTotalDiv.innerHTML = `Total: $${total.toFixed(2)}`;
            cartTotalDiv.style.display = 'block';
            checkoutBtn.style.display = 'block';
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        function checkout() {
            alert('Thank you for your order!\n\nTotal: $' + cart.reduce((sum, item) => sum + (item.price * item.quantity), 0).toFixed(2) + '\n\nProceed to payment...');
            cart = [];
            updateCart();
        }

        // Initialize
        renderProducts();
    </script>
</body>
</html>
